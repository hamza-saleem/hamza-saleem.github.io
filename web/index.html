<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="KageMichi — Portfolio of Hamza Saleem, Flutter Developer & Game Programmer.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KageMichi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KageMichi — Portfolio</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Preload the same fonts Flutter uses into the browser's CSS font system.
    This lets pretext measure text with the real font metrics (not system
    fallbacks) when window._pretext.measureText() is called.
  -->
  <!--
    Noto Serif JP is loaded here so the browser's CSS font system has it
    available for pretext canvas measurement (hero name underline).
    JetBrains Mono is bundled as a Flutter asset and needs no CSS preload.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&display=swap"
    rel="stylesheet"
  >

  <!--
    pretext bridge — imports the ESM package from jsDelivr and exposes
    window._pretext.measureText() for dart:js_interop.
    Must be type="module" because pretext uses ES module syntax.
  -->
  <script type="module" src="pretext_bridge.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
